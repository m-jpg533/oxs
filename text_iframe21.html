<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文章 + 圖片 + 影片切換展示</title>

<style>
  body {
    margin: 0;
    background: black;
    color: gold;
    font-family: "Microsoft JhengHei", sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    flex-direction: column;
    text-align: center;
  }



  #content {
    font-size: 20px;
    line-height: 1.6;
    max-width: 90%;
    min-height: 300px;
  }

  img, video, iframe {
    max-width: 90%;
    max-height: 70vh;
    border-radius: 10px;
  }

  .buttons {
    margin-top: 20px;
    display: flex;
    gap: 20px;
  }

  button {
    padding: 15px 30px;
    font-size: 24px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: #444;
    color: white;
  }

  button:hover {
    background: #666;
  }
  body{
  margin:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* ===== 科幻時鐘外框 ===== */
.clock{
  position:relative;
  top:50px;
  left:50px;
  width:140px;
  height:140px;
  border-radius:50%;
  background:
    radial-gradient(circle at top left,rgba(255,255,255,.25),transparent 40%),
    rgba(0,20,30,.55);
  backdrop-filter:blur(8px);
  border:2px solid rgba(0,255,255,.6);
  box-shadow:
    0 0 18px rgba(0,255,255,.7),
    inset 0 0 25px rgba(0,255,255,.35);
}

/* ===== 刻度 ===== */
.num{
  position:absolute;
  inset:0;
  text-align:center;
  font-size:14px;
  font-weight:bold;
  color:#9ff;
  text-shadow:0 0 8px rgba(0,255,255,.9);
}

.num span{
  display:block;
  margin-top:6px;
}

.n1{transform:rotate(30deg)}   .n1 span{transform:rotate(-30deg)}
.n2{transform:rotate(60deg)}   .n2 span{transform:rotate(-60deg)}
.n3{transform:rotate(90deg)}   .n3 span{transform:rotate(-90deg)}
.n4{transform:rotate(120deg)}  .n4 span{transform:rotate(-120deg)}
.n5{transform:rotate(150deg)}  .n5 span{transform:rotate(-150deg)}
.n6{transform:rotate(180deg)}  .n6 span{transform:rotate(-180deg)}
.n7{transform:rotate(210deg)}  .n7 span{transform:rotate(-210deg)}
.n8{transform:rotate(240deg)}  .n8 span{transform:rotate(-240deg)}
.n9{transform:rotate(270deg)}  .n9 span{transform:rotate(-270deg)}
.n10{transform:rotate(300deg)} .n10 span{transform:rotate(-300deg)}
.n11{transform:rotate(330deg)} .n11 span{transform:rotate(-330deg)}
.n12{transform:rotate(0deg)}

/* ===== 指針 ===== */
.hand{
  position:absolute;
  left:50%;
  top:50%;
  transform-origin:center bottom;
  filter:drop-shadow(0 0 6px rgba(0,255,255,.9));
}

.hour{
  width:4px;height:36px;
  background:#ff4d4d;
}
.minute{
  width:3px;height:48px;
  background:#ffe066;
}
.second{
  width:2px;height:58px;
  background:#00ffff;
  box-shadow:0 0 10px rgba(0,255,255,1);
}
/* ===== 能量核心 ===== */
.core{
  position:absolute;
  left:50%;
  top:50%;
  width:12px;
  height:12px;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:#00ffff;
  box-shadow:0 0 16px rgba(0,255,255,1);
  animation:core 1.4s infinite ease-in-out;
}

@keyframes core{
  0%{transform:translate(-50%,-50%) scale(1)}
  50%{transform:translate(-50%,-50%) scale(1.4)}
  100%{transform:translate(-50%,-50%) scale(1)}
}
</style>
</head>


</style>
</head>
<body>

<input type="date" name="mydate">

<div id="content">點擊「下一頁」開始</div>

<div class="buttons">
  <button id="prevBtn">上一頁</button>
  <button id="nextBtn">下一頁</button>
</div>

<script>
  // 內容結構：可放文字 / 圖片 / 影片 / YouTube
  const pages = [

    // 第 1 頁
    { type: "text", data: `王大帥 伉儷結婚 50 周年 快樂 跟阿祥新婚快樂E ...` },

    // 第 2 頁
    { type: "image", data: "https://m-jpg533.github.io/oxs/53.jpg" },

    // 第 3 頁
    { type: "text", data: `王大帥 他不僅英俊迷人，還非常熱情好客，讓每個人都感到賓至如歸...` },

    // 第 4 頁：圖片
    { type: "image", data: "https://m-jpg533.github.io/oxs/42.jpg" },
    
    // 第 6 頁：YouTube 影片（已修正）
    {
      type: "youtube",
      data: "https://www.youtube.com/embed/TU8gmFoDYgI?si=HI3LL2yVk-S36uzZ&amp;start=270"
    },
     //第7頁:文字
    { type:"text", data: '《我們都老了》，獨特的嗓音，單曲循環聽不夠！時光時光請你慢些走，我愛的人還沒有愛夠！唱的撕心裂肺，聽得痛哭流涕！'},

    // 第 8 頁：YouTube 影片（已修正）
    {
      type: "youtube",
      data: "https://www.youtube.com/embed/ojn790b7xB0?si=HI3LL2yVk-S36uzZ&amp;start=270"
    },
     
  ];

  let index = 0;

  function renderPage() {
    const area = document.getElementById("content");
    area.innerHTML = ""; // 清空顯示區域

    const page = pages[index];

    if (page.type === "text") {
      area.innerHTML = page.data;
    }
    else if (page.type === "image") {
      const img = document.createElement("img");
      img.src = page.data;
      area.appendChild(img);
    }
    else if (page.type === "video") {
      const video = document.createElement("video");
      video.src = page.data;
      video.controls = true;
      video.autoplay = true;
      area.appendChild(video);
    }
    else if (page.type === "youtube") {
      const iframe = document.createElement("iframe");
      iframe.src = page.data;
      iframe.width = "100%";
      iframe.height = "400";
      iframe.allow =
        "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture";
      iframe.allowFullscreen = true;
      area.appendChild(iframe);
    }
  }

  // 下一頁
  document.getElementById("nextBtn").addEventListener("click", () => {
    if (index < pages.length - 1) {
      index++;
      renderPage();
    }
  });

  // 上一頁
  document.getElementById("prevBtn").addEventListener("click", () => {
    if (index > 0) {
      index--;
      renderPage();
    }
  });

  // 初始顯示
  renderPage();


</script>


<div class="clock">
  <div class="num n12"><span>12</span></div>
  <div class="num n1"><span>1</span></div>
  <div class="num n2"><span>2</span></div>
  <div class="num n3"><span>3</span></div>
  <div class="num n4"><span>4</span></div>
  
  <div class="num n6"><span>6</span></div>
  <div class="num n7"><span>7</span></div>
  <div class="num n8"><span>8</span></div>
  
  <div class="num n10"><span>10</span></div>
  <div class="num n11"><span>11</span></div>

  <div class="hand hour" id="h"></div>
  <div class="hand minute" id="m"></div>
  <div class="hand second" id="s"></div>

  <div class="core"></div>
</div>

<script>
const h=document.getElementById("h");
const m=document.getElementById("m");
const s=document.getElementById("s");

setInterval(()=>{
  const d=new Date();
  h.style.transform=`translate(-50%,-100%) rotate(${(d.getHours()%12)*30 + d.getMinutes()/2}deg)`;
  m.style.transform=`translate(-50%,-100%) rotate(${d.getMinutes()*6}deg)`;
  s.style.transform=`translate(-50%,-100%) rotate(${d.getSeconds()*6}deg)`;
},1000);
</script>

</body>
</html>
